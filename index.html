<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make Money Online</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    background:#fff;
    padding:25px;
    border-radius:15px;
    max-width:400px;
    width:90%;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}
img{
    width:100%;
    border-radius:10px;
}
h1{
    font-size:22px;
    margin:15px 0;
    color:#222;
}
p{
    color:#555;
    font-size:14px;
}
input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:14px;
}
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#ff416c,#ff4b2b);
    color:#fff;
    font-size:16px;
    cursor:pointer;
}
.loading{
    display:none;
    margin-top:10px;
    font-size:14px;
    color:#333;
}
</style>
</head>
<body>

<div class="container">
<img src="https://i.imgur.com/itgUKFw.jpeg">
<h1>How to Make $10,000 Per Month Online</h1>
<p>Enter your email to get instant access.</p>

<form id="form">
<input type="email" id="email" placeholder="Enter your email" required>
<button type="submit">🚀 Continue</button>
<div class="loading" id="loading">Processing...</div>
</form>
</div>

<script>
document.getElementById("form").addEventListener("submit", async function(e){
    e.preventDefault();

    var email = document.getElementById("email").value;
    var loading = document.getElementById("loading");
    loading.style.display = "block";

    try {
        await fetch("https://script.google.com/macros/s/AKfycbyUyOiYbWRgoa2_XLT3mckiL7hMTV-q5OZjSICla7cmr3vKc1Entg3nYa29H0ybJdRs_g/exec", {
            method: "POST",
            body: new URLSearchParams({
                email: email
            })
        });
    } catch(err) {
        console.log("Fetch Error:", err);
    }

    // Redirect after short delay to ensure email is saved
    setTimeout(function(){
        window.location.href = "https://your-smart-link.com";
    }, 1200);
});
</script>

</body>
</html>
